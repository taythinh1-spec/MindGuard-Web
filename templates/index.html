<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindGuard — Trợ lý Tâm lý AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0d1117;
  --bg-mid: #161b27;
  --bg-surface: rgba(255,255,255,0.04);
  --bg-surface-hover: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.10);
  --glass-strong: rgba(255,255,255,0.10);
  --teal-400: #4ecdc4;
  --teal-300: #81e8e2;
  --teal-200: #b2f0eb;
  --teal-100: #e0faf8;
  --lavender: #a78bfa;
  --lavender-soft: #c4b5fd;
  --lavender-dim: rgba(167,139,250,0.15);
  --sage: #6ee7b7;
  --text-primary: rgba(255,255,255,0.92);
  --text-secondary: rgba(255,255,255,0.55);
  --text-muted: rgba(255,255,255,0.30);
  --accent-grad: linear-gradient(135deg, #4ecdc4 0%, #a78bfa 100%);
  --bubble-bot: rgba(255,255,255,0.07);
  --bubble-user-start: #2d9e97;
  --bubble-user-end: #7c63e8;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --radius-xl: 28px;
  --sidebar-w: 275px;
  --shadow-glass: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-msg: 0 2px 12px rgba(0,0,0,0.25);
  --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-deep);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Atmospheric background blobs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(78,205,196,0.12) 0%, transparent 70%);
  top: -100px; left: -100px;
}
body::after {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(167,139,250,0.10) 0%, transparent 70%);
  bottom: -150px; right: -150px;
}

/* ─── MAIN CONTAINER ─── */
.main-container {
  display: flex;
  width: min(1060px, 100%);
  height: min(780px, 92vh);
  background: rgba(22,27,39,0.85);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-radius: var(--radius-xl);
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-glass), inset 0 1px 0 rgba(255,255,255,0.07);
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ─── MODAL OVERLAY ─── */
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(13,17,23,0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  transition: opacity var(--transition);
}

.modal-box {
  background: rgba(30,35,50,0.95);
  border: 1px solid var(--glass-border);
  padding: 36px 32px;
  border-radius: var(--radius-xl);
  width: 360px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  text-align: center;
  animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.88) translateY(20px); }
  to   { opacity: 1; transform: scale(1)    translateY(0);    }
}

.modal-box h3 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}

.modal-box p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 22px;
}

/* Avatar upload */
.avatar-upload {
  margin-bottom: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.avatar-preview-box {
  width: 84px; height: 84px;
  border-radius: 50%;
  overflow: hidden;
  border: 2.5px solid transparent;
  background: linear-gradient(var(--bg-mid), var(--bg-mid)) padding-box,
              var(--accent-grad) border-box;
  display: flex; justify-content: center; align-items: center;
  box-shadow: 0 0 24px rgba(78,205,196,0.2);
  transition: box-shadow var(--transition);
}
.avatar-preview-box:hover { box-shadow: 0 0 32px rgba(78,205,196,0.35); }
.avatar-preview-box img { width: 100%; height: 100%; object-fit: cover; }

.upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; }
.upload-btn-wrapper button {
  background: rgba(78,205,196,0.12);
  border: 1px solid rgba(78,205,196,0.3);
  color: var(--teal-300);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background var(--transition), border-color var(--transition);
}
.upload-btn-wrapper button:hover {
  background: rgba(78,205,196,0.22);
  border-color: rgba(78,205,196,0.5);
}
.upload-btn-wrapper input[type=file] {
  font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer;
}

.modal-box input[type="text"],
.modal-box input[type="number"] {
  width: 100%;
  padding: 13px 16px;
  margin-bottom: 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm);
  outline: none;
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
}
.modal-box input:focus {
  border-color: rgba(78,205,196,0.5);
  background: rgba(78,205,196,0.06);
  box-shadow: 0 0 0 3px rgba(78,205,196,0.12);
}
.modal-box input::placeholder { color: var(--text-muted); }

.modal-box .save-btn {
  width: 100%;
  padding: 13px;
  background: var(--accent-grad);
  color: #0d1117;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 20px rgba(78,205,196,0.3);
  letter-spacing: 0.2px;
}
.modal-box .save-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(78,205,196,0.4); }
.modal-box .save-btn:active { transform: translateY(0); }

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: rgba(13,17,23,0.6);
  border-right: 1px solid var(--glass-border);
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow: hidden;
}

/* Sidebar brand mark */
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 6px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.brand-dot {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: var(--accent-grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(78,205,196,0.3);
}
.brand-text {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

/* User info box */
.user-info-box {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  padding: 14px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  gap: 11px;
  transition: background var(--transition);
}
.user-info-box:hover { background: var(--glass-strong); }

.sidebar-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid transparent;
  background: linear-gradient(var(--bg-mid), var(--bg-mid)) padding-box,
              var(--accent-grad) border-box;
  flex-shrink: 0;
}
.sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; }

.user-details { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.user-details .name {
  font-weight: 600; font-size: 14px;
  color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-details .year { font-size: 11px; color: var(--text-muted); }

.edit-info-btn {
  font-size: 11px;
  color: var(--teal-400);
  background: none; border: none;
  cursor: pointer;
  padding: 0;
  font-family: 'DM Sans', sans-serif;
  text-decoration: none;
  transition: color var(--transition);
  text-align: left;
}
.edit-info-btn:hover { color: var(--teal-300); }

/* New chat button */
.new-chat-btn {
  background: rgba(78,205,196,0.10);
  color: var(--teal-300);
  border: 1px solid rgba(78,205,196,0.22);
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  font-weight: 500;
  font-size: 13.5px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  text-align: center;
  transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  letter-spacing: 0.1px;
}
.new-chat-btn:hover {
  background: rgba(78,205,196,0.18);
  border-color: rgba(78,205,196,0.4);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(78,205,196,0.15);
}
.new-chat-btn:active { transform: translateY(0); }

/* History */
.history-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 0 4px;
}

.history-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.08) transparent;
}

.history-item {
  padding: 10px 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
  gap: 6px;
}
.history-item:hover {
  background: var(--glass);
  border-color: var(--glass-border);
  color: var(--text-primary);
}
.history-item.active {
  background: rgba(78,205,196,0.08);
  border-color: rgba(78,205,196,0.2);
  color: var(--teal-300);
}
.history-item span {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}

.delete-history-btn {
  color: rgba(255,100,100,0.5);
  border: none; background: none;
  cursor: pointer;
  font-size: 14px;
  display: none;
  flex-shrink: 0;
  transition: color var(--transition);
  line-height: 1;
  padding: 2px;
}
.history-item:hover .delete-history-btn { display: inline; }
.delete-history-btn:hover { color: #ff6b6b; }

/* ─── CHAT AREA ─── */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: transparent;
}

.chat-header {
  padding: 18px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  background: rgba(13,17,23,0.3);
}
.header-bot-avatar {
  width: 38px; height: 38px; border-radius: 12px;
  background: var(--accent-grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 14px rgba(78,205,196,0.25);
  flex-shrink: 0;
}
.header-info { display: flex; flex-direction: column; gap: 2px; }
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.2px;
}
.header-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary);
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--sage);
  box-shadow: 0 0 6px var(--sage);
  animation: pulse 2.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

/* Chat messages */
.chat-box {
  flex: 1;
  padding: 24px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.07) transparent;
}

@keyframes msgSlideUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0);    }
}

.message-wrapper {
  display: flex;
  gap: 11px;
  animation: msgSlideUp 0.3s cubic-bezier(0.4,0,0.2,1) forwards;
  max-width: 82%;
}
.bot-wrapper  { align-self: flex-start; }
.user-wrapper { align-self: flex-end; flex-direction: row-reverse; }

.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; justify-content: center; align-items: center;
  flex-shrink: 0;
  overflow: hidden;
  margin-top: 2px;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.bot-avatar {
  background: rgba(78,205,196,0.12);
  border: 1.5px solid rgba(78,205,196,0.25);
}
.user-avatar {
  background: rgba(167,139,250,0.12);
  border: 1.5px solid rgba(167,139,250,0.25);
}

.message {
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.65;
  word-break: break-word;
  box-shadow: var(--shadow-msg);
  max-width: 100%;
}
.bot-message {
  background: var(--bubble-bot);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-primary);
  border-bottom-left-radius: 5px;
}
.user-message {
  background: linear-gradient(135deg, var(--bubble-user-start) 0%, var(--bubble-user-end) 100%);
  color: rgba(255,255,255,0.95);
  border-bottom-right-radius: 5px;
  border: none;
  box-shadow: 0 4px 20px rgba(78,205,196,0.2);
}

.message-image {
  max-width: 100%;
  border-radius: 10px;
  margin-top: 8px;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  display: block;
}
.message-image:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

/* Typing indicator */
.typing-indicator { display: flex; gap: 5px; padding: 4px 2px; align-items: center; }
.typing-indicator span {
  width: 7px; height: 7px;
  background: var(--teal-400);
  border-radius: 50%;
  animation: typingBounce 1.3s infinite ease-in-out both;
  opacity: 0.7;
}
.typing-indicator span:nth-child(1) { animation-delay: -0.3s; }
.typing-indicator span:nth-child(2) { animation-delay: -0.15s; }
@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40%           { transform: scale(1);   opacity: 1;   }
}

/* ─── INPUT AREA ─── */
.input-area {
  padding: 16px 20px 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: rgba(13,17,23,0.3);
  flex-shrink: 0;
}

.input-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: rgba(255,255,255,0.05);
  border-radius: var(--radius-md);
  border: 1px solid rgba(255,255,255,0.10);
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
}
.input-wrapper:focus-within {
  border-color: rgba(78,205,196,0.4);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 0 3px rgba(78,205,196,0.10);
}

.image-preview-container {
  padding: 10px 12px;
  display: none;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
  position: relative;
}
.image-preview-container img {
  max-height: 90px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
}
.remove-preview-btn {
  position: absolute; top: 8px; left: 108px;
  background: rgba(0,0,0,0.65);
  color: white; border: none;
  width: 20px; height: 20px;
  border-radius: 50%; font-size: 11px;
  cursor: pointer;
  display: flex; justify-content: center; align-items: center;
  transition: background var(--transition);
}
.remove-preview-btn:hover { background: rgba(255,80,80,0.75); }

.input-area input[type="text"] {
  width: 100%;
  padding: 13px 18px;
  border: none;
  background: transparent;
  outline: none;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-primary);
}
.input-area input::placeholder { color: var(--text-muted); }

.attach-btn {
  background: none; border: none;
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
  padding: 9px;
  transition: color var(--transition), background var(--transition), transform var(--transition);
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  flex-shrink: 0;
}
.attach-btn:hover {
  color: var(--teal-400);
  background: rgba(78,205,196,0.10);
  transform: scale(1.08);
}

.send-btn {
  background: var(--accent-grad);
  color: #0d1117;
  border: none;
  width: 44px; height: 44px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 17px;
  display: flex; justify-content: center; align-items: center;
  flex-shrink: 0;
  transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 16px rgba(78,205,196,0.3);
}
.send-btn:hover {
  opacity: 0.9;
  transform: scale(1.07) translateY(-1px);
  box-shadow: 0 6px 22px rgba(78,205,196,0.4);
}
.send-btn:active { transform: scale(0.97); }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* ─── RESPONSIVE ─── */
@media (max-width: 680px) {
  body { padding: 0; align-items: stretch; }
  .main-container {
    width: 100%; height: 100vh;
    border-radius: 0; border: none;
  }
  .sidebar { display: none; }
  .chat-container { width: 100%; }
}

@media (max-width: 820px) and (min-width: 681px) {
  :root { --sidebar-w: 220px; }
  .main-container { width: 100%; height: 100vh; border-radius: 0; border: none; }
  body { padding: 0; }
}
</style>
</head>
<body>

<div class="main-container">

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3>MindGuard xin chào 👋</h3>
      <p>Hãy tùy chỉnh hồ sơ của bạn nhé!</p>
      <div class="avatar-upload">
        <div class="avatar-preview-box">
          <img id="modal-avatar-preview" src="https://cdn-icons-png.flaticon.com/512/3177/3177440.png">
        </div>
        <div class="upload-btn-wrapper">
          <button>📸 Đổi ảnh đại diện</button>
          <input type="file" id="input-avatar" accept="image/*" onchange="handleProfileImageUpload(event)">
        </div>
      </div>
      <input type="text"   id="input-name" placeholder="Tên của bạn là gì?">
      <input type="number" id="input-year" placeholder="Năm sinh của bạn?">
      <button class="save-btn" onclick="saveUserInfo()">Lưu &amp; Bắt đầu ✨</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-dot">🧠</div>
      <span class="brand-text">MindGuard</span>
    </div>

    <div class="user-info-box" id="user-info-display" style="display:none;">
      <div class="sidebar-avatar">
        <img id="sidebar-avatar-img" src="">
      </div>
      <div class="user-details">
        <span class="name"  id="display-name">Học sinh</span>
        <span class="year"  id="display-year">Năm sinh</span>
        <button class="edit-info-btn" onclick="openModal()">✎ Sửa hồ sơ</button>
      </div>
    </div>

    <button class="new-chat-btn" onclick="startNewChat()">+ Đoạn chat mới</button>

    <span class="history-label">Gần đây</span>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- CHAT CONTAINER -->
  <div class="chat-container">
    <div class="chat-header">
      <div class="header-bot-avatar">🧠</div>
      <div class="header-info">
        <span class="header-title">MindGuard AI</span>
        <div class="header-status">
          <span class="status-dot"></span>
          <span>Luôn sẵn sàng lắng nghe bạn</span>
        </div>
      </div>
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
      <input type="file" id="chat-attach-image" accept="image/*" style="display:none;" onchange="handleChatImageUpload(event)">
      <label for="chat-attach-image" class="attach-btn" title="Tải ảnh lên">📸</label>

      <div class="input-wrapper">
        <div class="image-preview-container" id="chat-image-preview-container">
          <img id="chat-image-preview-img" src="">
          <button class="remove-preview-btn" onclick="removeChatImagePreview()">✕</button>
        </div>
        <input type="text" id="user-input" placeholder="Bạn đang nghĩ gì?..." onkeypress="handleEnter(event)">
      </div>

      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script>
const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");
const historyList = document.getElementById("history-list");
const modalOverlay = document.getElementById("modal-overlay");
const chatImagePreviewContainer = document.getElementById("chat-image-preview-container");
const chatImagePreviewImg = document.getElementById("chat-image-preview-img");

let currentSessionId = null;
let currentUser = { name: "Bạn", year: "", avatar: "" };
let tempProfileAvatarBase64 = "";
let currentChatImageBase64 = "";

const BOT_AVATAR_IMG = "https://cdn-icons-png.flaticon.com/512/8649/8649595.png";
const DEFAULT_USER_AVATAR = "https://cdn-icons-png.flaticon.com/512/3177/3177440.png";

function handleChatImageUpload(event) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      currentChatImageBase64 = e.target.result;
      chatImagePreviewImg.src = currentChatImageBase64;
      chatImagePreviewContainer.style.display = "block";
      userInput.focus();
    };
    reader.readAsDataURL(file);
  }
}

function removeChatImagePreview() {
  currentChatImageBase64 = "";
  chatImagePreviewImg.src = "";
  chatImagePreviewContainer.style.display = "none";
  document.getElementById("chat-attach-image").value = "";
}

function handleProfileImageUpload(event) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      tempProfileAvatarBase64 = e.target.result;
      document.getElementById("modal-avatar-preview").src = tempProfileAvatarBase64;
    };
    reader.readAsDataURL(file);
  }
}

function checkUserInfo() {
  let savedInfo = localStorage.getItem('mindguard_user');
  if (savedInfo) {
    currentUser = JSON.parse(savedInfo);
    updateUserInfoDisplay();
    loadInitialChat();
  } else {
    openModal();
  }
}

function openModal() {
  modalOverlay.style.display = "flex";
  if (currentUser.name !== "Bạn") document.getElementById("input-name").value = currentUser.name;
  if (currentUser.year) document.getElementById("input-year").value = currentUser.year;
  tempProfileAvatarBase64 = currentUser.avatar || DEFAULT_USER_AVATAR;
  document.getElementById("modal-avatar-preview").src = tempProfileAvatarBase64;
}

function saveUserInfo() {
  let nameInput = document.getElementById("input-name").value.trim();
  let yearInput = document.getElementById("input-year").value.trim();
  if (!nameInput) { alert("Vui lòng nhập tên của bạn nhé!"); return; }
  currentUser = {
    name: nameInput,
    year: yearInput,
    avatar: tempProfileAvatarBase64 !== DEFAULT_USER_AVATAR ? tempProfileAvatarBase64 : ""
  };
  localStorage.setItem('mindguard_user', JSON.stringify(currentUser));
  modalOverlay.style.display = "none";
  updateUserInfoDisplay();
  let allUserAvatars = document.querySelectorAll('.user-avatar img');
  let realAvatar = currentUser.avatar || DEFAULT_USER_AVATAR;
  allUserAvatars.forEach(img => img.src = realAvatar);
  let sessions = getAllSessions();
  if (Object.keys(sessions).length === 0) startNewChat();
}

function updateUserInfoDisplay() {
  document.getElementById("user-info-display").style.display = "flex";
  document.getElementById("display-name").innerText = currentUser.name;
  document.getElementById("display-year").innerText = currentUser.year ? "Sinh năm: " + currentUser.year : "";
  document.getElementById("sidebar-avatar-img").src = currentUser.avatar || DEFAULT_USER_AVATAR;
}

function getAllSessions() { return JSON.parse(localStorage.getItem('mindguard_sessions')) || {}; }
function saveAllSessions(sessions) { localStorage.setItem('mindguard_sessions', JSON.stringify(sessions)); }

function renderSidebar() {
  historyList.innerHTML = "";
  let sessions = getAllSessions();
  Object.keys(sessions).forEach(id => {
    let item = document.createElement("div");
    item.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
    item.onclick = () => switchSession(id);
    let title = sessions[id].title || "Đoạn chat trống";
    item.innerHTML = `<span>💬 ${title}</span><button class="delete-history-btn" onclick="deleteSession(event, '${id}')">✕</button>`;
    historyList.appendChild(item);
  });
}

function startNewChat() {
  currentSessionId = "session_" + Date.now();
  chatBox.innerHTML = "";
  appendMessage("bot", `Chào ${currentUser.name}, mình là MindGuard. Hôm nay ở trường của bạn thế nào, có chuyện gì vui hay áp lực không, kể mình nghe nhé?`);
  renderSidebar();
}

function switchSession(id) {
  currentSessionId = id;
  chatBox.innerHTML = "";
  let sessions = getAllSessions();
  let history = sessions[id].messages || [];
  history.forEach(chat => appendMessage(chat.sender, chat.text, chat.image));
  renderSidebar();
}

function saveMessage(sender, text, imageBase64) {
  let sessions = getAllSessions();
  if (!sessions[currentSessionId]) {
    sessions[currentSessionId] = {
      title: text ? text.substring(0, 20) + "..." : "[Hình ảnh]",
      messages: []
    };
  }
  sessions[currentSessionId].messages.push({ sender: sender, text: text, image: imageBase64 });
  saveAllSessions(sessions);
  renderSidebar();
}

function deleteSession(event, id) {
  event.stopPropagation();
  if (confirm("Xóa đoạn chat này?")) {
    let sessions = getAllSessions();
    delete sessions[id];
    saveAllSessions(sessions);
    if (currentSessionId === id) startNewChat(); else renderSidebar();
  }
}

function appendMessage(sender, text, imageBase64) {
  let wrapper = document.createElement("div");
  wrapper.className = `message-wrapper ${sender}-wrapper`;

  let avatar = document.createElement("div");
  avatar.className = `avatar ${sender}-avatar`;
  let avatarImg = document.createElement("img");
  avatarImg.src = sender === "user" ? (currentUser.avatar || DEFAULT_USER_AVATAR) : BOT_AVATAR_IMG;
  avatar.appendChild(avatarImg);

  let msgDiv = document.createElement("div");
  msgDiv.className = `message ${sender}-message`;

  if (text) {
    let textSpan = document.createElement("span");
    textSpan.innerHTML = text.replace(/\n/g, '<br>');
    msgDiv.appendChild(textSpan);
  }

  if (imageBase64) {
    let imgHtml = document.createElement("img");
    imgHtml.src = imageBase64;
    imgHtml.className = "message-image";
    imgHtml.onclick = () => window.open(imageBase64, '_blank');
    msgDiv.appendChild(imgHtml);
  }

  wrapper.appendChild(avatar);
  wrapper.appendChild(msgDiv);
  chatBox.appendChild(wrapper);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
  let wrapper = document.createElement("div");
  wrapper.className = "message-wrapper bot-wrapper";
  wrapper.id = "typing-indicator";
  wrapper.innerHTML = `<div class="avatar bot-avatar"><img src="${BOT_AVATAR_IMG}"></div><div class="message bot-message"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  chatBox.appendChild(wrapper);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function hideTyping() {
  let indicator = document.getElementById("typing-indicator");
  if (indicator) indicator.remove();
}

function handleEnter(event) { if (event.key === "Enter") sendMessage(); }

function sendMessage() {
  let text = userInput.value.trim();
  if (!text && !currentChatImageBase64) return;

  appendMessage("user", text, currentChatImageBase64);
  saveMessage("user", text, currentChatImageBase64);

  let imageToSend = currentChatImageBase64;
  userInput.value = "";
  removeChatImagePreview();

  showTyping();

  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message: text,
      image: imageToSend,
      user_name: currentUser.name
    })
  })
  .then(response => response.json())
  .then(data => {
    hideTyping();
    let aiReply = data.reply || "Mình đang lắng nghe bạn đây.";
    appendMessage("bot", aiReply, null);
    saveMessage("bot", aiReply, null);
  })
  .catch(error => {
    hideTyping();
    appendMessage("bot", "Hệ thống đang bận, bạn đợi mình một xíu nhé!");
  });
}

function loadInitialChat() {
  let sessions = getAllSessions();
  let keys = Object.keys(sessions);
  if (keys.length > 0) {
    currentSessionId = keys[keys.length - 1];
    switchSession(currentSessionId);
  } else {
    startNewChat();
  }
}

window.onload = function() { checkUserInfo(); };
</script>
</body>
</html>
