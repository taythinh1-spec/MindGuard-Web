<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGuard AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #0b0f19; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; color: #f1f5f9; }
        .app-wrapper { display: flex; width: 1300px; height: 850px; background: #131a2e; border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; overflow: hidden; }
        
        /* KHUNG CHAT */
        .chat-section { flex: 1; display: flex; flex-direction: column; background: #0f1524; }
        .chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { font-size: 18px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .student-tag { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 8px; font-size: 13px; color: #94a3b8; }
        
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #0d1220; }
        .msg-row { display: flex; gap: 12px; width: 100%; animation: fadeIn 0.2s ease; }
        .msg-row.bot { justify-content: flex-start; }
        .msg-row.user { justify-content: flex-end; flex-direction: row-reverse; }
        
        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #1e293b; color: #fff; font-size: 14px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
        .msg-row.bot .avatar { background: #3b82f6; }
        .msg-row.user .avatar { background: #a855f7; }
        
        .bubble-wrapper { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
        .sender-title { font-size: 11px; font-weight: 700; color: #64748b; }
        .bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.5; color: #cbd5e1; }
        .msg-row.bot .bubble { background: #1e293b; border-top-left-radius: 4px; }
        .msg-row.user .bubble { background: #1f2937; border-top-right-radius: 4px; }
        .bubble-img { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 8px; display: block; border: 1px solid rgba(255,255,255,0.1); }

        .input-bar { padding: 15px 20px; background: #0f1524; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
        .input-wrapper { flex: 1; background: #111827; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; padding: 0 15px; }
        .input-wrapper input { flex: 1; padding: 12px 0; border: none; background: transparent; outline: none; color: white; font-size: 14px; }
        .send-btn { background: #3b82f6; color: white; border: none; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* CAMERA SECTION */
        .camera-section { width: 360px; background: #111827; padding: 25px; display: flex; flex-direction: column; align-items: center; gap: 20px; border-left: 1px solid rgba(255,255,255,0.06); }
        .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #4b5563; width: 100%; }
        .camera-container { width: 220px; height: 220px; border-radius: 50%; position: relative; display: flex; justify-content: center; align-items: center; background: #090d16; border: 2px dashed rgba(6, 182, 212, 0.4); }
        .video-mask { width: 85%; height: 85%; border-radius: 50%; overflow: hidden; transform: scaleX(-1); }
        .video-mask video { width: 100%; height: 100%; object-fit: cover; }
        .scan-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #1e1b4b; border: 1px solid rgba(99,102,241,0.3); color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .scan-btn:hover { background: #2e1065; }
        
        .history-card { background: #0f1524; width: 100%; border-radius: 10px; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.04); }
        .history-pic { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; transform: scaleX(-1); }
        .history-pic img { width: 100%; height: 100%; object-fit: cover; }
        .history-info { display: flex; flex-direction: column; gap: 2px; }
        .history-info .status { font-size: 13px; font-weight: 600; color: #10b981; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="chat-section">
            <div class="chat-header">
                <h2><i class="fa-solid fa-brain"></i> MindGuard AI</h2>
                <div class="student-tag" id="student-tag">THỊNH - 2007</div>
            </div>
            <div class="chat-box" id="chat-box">
                <div class="msg-row bot">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble-wrapper">
                        <div class="sender-title">MINDGUARD AI</div>
                        <div class="bubble">Xin chào Thịnh! Mình đã sẵn sàng đồng hành cùng bạn. Hãy nhấn nút Quét Khuôn Mặt bên phải để mình lắng nghe cảm xúc của bạn qua sinh trắc học nhé! 💙</div>
                    </div>
                </div>
            </div>
            <div class="input-bar">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Nhập tin nhắn tâm sự..." onkeypress="if(event.key==='Enter') sendText()">
                </div>
                <button class="send-btn" onclick="sendText()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="camera-section">
            <div class="section-title">MÁY QUẾT SINH TRẮC HỌC</div>
            <div class="camera-container">
                <div class="video-mask">
                    <video id="webcam" autoplay playsinline></video>
                </div>
            </div>
            <button class="scan-btn" id="scan-btn" onclick="startScan()"><i class="fa-solid fa-camera"></i> BẮT ĐẦU QUẾT KHUÔN MẶT</button>
            
            <div class="section-title" style="margin-top: 10px;">LẦN QUẾT GẦN NHẤT</div>
            <div id="history-box" style="width: 100%; display: flex; flex-direction: column; gap: 10px;"></div>
        </div>
    </div>

    <canvas id="canvas" style="display: none;" width="640" height="480"></canvas>

    <script>
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const scanBtn = document.getElementById("scan-btn");
        const historyBox = document.getElementById("history-box");

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s).catch(e => console.log(e));

        function appendMsg(sender, text, img = "") {
            const row = document.createElement("div");
            row.className = `msg-row ${sender}`;
            const avatarHtml = sender === 'bot' ? '<i class="fa-solid fa-robot"></i>' : '<i class="fa-solid fa-user"></i>';
            const title = sender === 'bot' ? 'MINDGUARD AI' : 'HỌC SINH';
            
            let html = `<div class="avatar">${avatarHtml}</div><div class="bubble-wrapper"><div class="sender-title">${title}</div><div class="bubble">${text}`;
            if(img) html += `<img class="bubble-img" src="${img}">`;
            html += `</div></div>`;
            
            row.innerHTML = html;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendText() {
            const val = userInput.value.trim();
            if(!val) return;
            appendMsg('user', val);
            userInput.value = "";

            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: val, student_code: "THỊNH" })
            }).then(r => r.json()).then(d => appendMsg('bot', d.reply));
        }

        function startScan() {
            scanBtn.disabled = true;
            scanBtn.innerText = "ĐANG PHÂN TÍCH...";
            
            setTimeout(() => {
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1,0,0,1,0,0);
                
                const base64Img = canvas.toDataURL('image/jpeg');
                appendMsg('user', "[Hệ thống]: Ảnh quét biểu cảm khuôn mặt thực tế.", base64Img);

                fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: "", student_code: "THỊNH", image: base64Img, is_scan: true })
                }).then(r => r.json()).then(d => {
                    appendMsg('bot', d.reply);
                    updateHistory(base64Img, d.level);
                    scanBtn.disabled = false;
                    scanBtn.innerHTML = '<i class="fa-solid fa-camera"></i> BẮT ĐẦU QUẾT KHUÔN MẶT';
                }).catch(() => {
                    scanBtn.disabled = false;
                    scanBtn.innerHTML = '<i class="fa-solid fa-camera"></i> BẮT ĐẦU QUẾT KHUÔN MẶT';
                });
            }, 1000);
        }

        function updateHistory(img, level) {
            let statusText = level === 'Safe' ? 'An toàn' : (level === 'Warning' ? 'Áp lực / Mệt mỏi' : 'Nguy cơ cao');
            let color = level === 'Safe' ? '#10b981' : (level === 'Warning' ? '#f59e0b' : '#ef4444');
            
            historyBox.innerHTML = `
                <div class="history-card">
                    <div class="history-pic"><img src="${img}"></div>
                    <div class="history-info">
                        <span style="font-size: 11px; color: #4b5563;">Vừa xong</span>
                        <span class="status" style="color: ${color};">• ${statusText}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
