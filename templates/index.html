<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGuard AI - Hệ Thống Hỗ Trợ Tâm Lý Học Đường</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2, h3 { color: #1e3d59; margin-top: 0; }
        input[type="text"] { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #17b978; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; }
        button:hover { background-color: #139a63; }
        .chat-box { height: 300px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; overflow-y: auto; background: #f9f9f9; margin-bottom: 10px; }
        .msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; font-size: 14px; }
        .user-msg { background-color: #007bff; color: white; margin-left: auto; text-align: right; }
        .bot-msg { background-color: #e2e8f0; color: #333; margin-right: auto; }
        .system-btn { background-color: #007bff; }
        .system-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h3>📝 Bước 1: Khai báo thông tin học sinh</h3>
        <input type="text" id="regCode" placeholder="Nhập Mã học sinh tự chọn (Ví dụ: HS99)">
        <input type="text" id="regName" placeholder="Nhập Họ và Tên học sinh (Ví dụ: Nguyễn Văn A)">
        <input type="text" id="regParent" placeholder="Nhập ID Telegram của Phụ huynh (Lấy từ @userinfobot)">
        <button class="system-btn" onclick="dangKyThongTin()">Lưu Vào Hệ Thống</button>
    </div>

    <div class="container">
        <h2>🧠 Bước 2: Phòng chat MindGuard AI</h2>
        <input type="text" id="chatCode" placeholder="Nhập lại Mã học sinh của bạn để hệ thống nhận diện...">
        
        <div class="chat-box" id="chatBox">
            <div class="msg bot-msg">Chào bạn, mình là MindGuard. Hôm nay bạn có tâm sự gì muốn chia sẻ cùng mình không? 💙</div>
        </div>
        
        <input type="text" id="userMessage" placeholder="Nhập tin nhắn tâm sự ở đây..." onkeypress="if(event.key === 'Enter') guiTinNhan()">
        <button onclick="guiTinNhan()">Gửi Tin Nhắn</button>
    </div>

    <script>
        // Hàm gửi dữ liệu đăng ký lên máy chủ
        function dangKyThongTin() {
            let code = document.getElementById("regCode").value;
            let name = document.getElementById("regName").value;
            let parent = document.getElementById("regParent").value;

            if(!code || !name || !parent) {
                alert("Vui lòng nhập đầy đủ thông tin trước khi lưu!");
                return;
            }

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_code: code, student_name: name, parent_id: parent })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert("Chúc mừng! Hệ thống đã ghi nhận thông tin tự động. Bây giờ bạn có thể dùng Mã này để chat ở ô phía dưới.");
                    document.getElementById("chatCode").value = code; // Tự động điền mã xuống ô chat cho tiện
                } else {
                    alert("Lỗi: " + data.message);
                }
            })
            .catch(err => alert("Không kết nối được server: " + err));
        }

        // Hàm xử lý gửi tin nhắn chat
        function guiTinNhan() {
            let messageInput = document.getElementById("userMessage");
            let codeInput = document.getElementById("chatCode");
            let chatBox = document.getElementById("chatBox");

            let message = messageInput.value.trim();
            let studentCode = codeInput.value.trim();

            if (!message) return;
            if (!studentCode) {
                alert("Vui lòng điền Mã học sinh ở ô phía trên để bot nhận diện nhé!");
                return;
            }

            // Hiển thị tin nhắn của học sinh lên màn hình chat
            chatBox.innerHTML += `<div class="msg user-msg">${message}</div>`;
            messageInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Gửi yêu cầu chat lên máy chủ Flask
            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, student_code: studentCode })
            })
            .then(res => res.json())
            .then(data => {
                // Hiển thị câu trả lời từ Bot lên màn hình chat
                chatBox.innerHTML += `<div class="msg bot-msg">${data.reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(err => {
                chatBox.innerHTML += `<div class="msg bot-msg" style="color:red;">Hệ thống đang bận hoặc gặp sự cố kết nối. Thử lại sau ít giây!</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
