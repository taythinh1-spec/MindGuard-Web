<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGuard AI — Trợ lý Tâm lý</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131c2e;
            --bg-chat-bot: #1e293b;
            --bg-chat-user: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --safe-color: #10b981;
            --border-color: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-primary); display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }

        .app-container {
            display: flex; flex-direction: column; width: 100%; max-width: 800px; height: 90vh;
            background-color: var(--bg-card); border-radius: 16px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); border: 1px solid var(--border-color); position: relative;
        }

        /* LOGIN SCREEN */
        .login-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-card); z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background-color: #0b1120; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid var(--border-color); text-align: center; }
        .login-box h2 { margin-bottom: 20px; font-size: 20px; }
        .login-box p { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
        .login-group { margin-bottom: 15px; text-align: left; }
        .login-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
        .login-group input { width: 100%; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; color: var(--text-primary); outline: none; font-size: 14px; }
        .btn-login { width: 100%; background-color: var(--accent-color); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 14px; }

        /* CHAT UI */
        .chat-ui-wrapper { display: none; flex-direction: column; height: 100%; }
        .chat-header { padding: 16px 20px; background-color: rgba(19, 28, 46, 0.95); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
        .header-left h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .status-dot { font-size: 12px; color: var(--safe-color); display: flex; align-items: center; gap: 6px; }
        .header-actions { display: flex; gap: 10px; }
        .btn-action { background: none; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .btn-action.active { color: var(--accent-color); border-color: var(--accent-color); }
        
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background-color: #0b1120; }
        .message { display: flex; gap: 12px; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; object-fit: cover; }
        .bot .avatar { background-color: var(--accent-color); color: white; }
        .user .avatar { border: 2px solid var(--accent-color); }
        .message-info { display: flex; flex-direction: column; gap: 4px; }
        .sender-name { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
        .user .sender-name { text-align: right; }
        .message-content { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-word; }
        .bot .message-content { background-color: var(--bg-chat-bot); border-top-left-radius: 2px; }
        .user .message-content { background-color: var(--bg-chat-user); color: #ffffff; border-top-right-radius: 2px; }
        
        .chat-input-area { padding: 16px 20px; background-color: var(--bg-card); border-top: 1px solid var(--border-color); display: flex; gap: 12px; align-items: center; }
        .chat-input-area input { flex: 1; background-color: #0b1120; border: 1px solid var(--border-color); border-radius: 24px; padding: 12px 20px; color: var(--text-primary); font-size: 14px; outline: none; }
        .chat-input-area button { background-color: var(--accent-color); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="login-screen" id="loginScreen">
            <div class="login-box">
                <h2><i class="fa-solid fa-shield-halved"></i> MindGuard</h2>
                <p>Vui lòng cho mình biết tên và ID Instagram để mình tiện xưng hô nhé!</p>
                <div class="login-group">
                    <label>Tên gọi của bạn</label>
                    <input type="text" id="initName" placeholder="VD: Hoàng Đức" onkeypress="if(event.key==='Enter') startSystem()">
                </div>
                <div class="login-group">
                    <label>ID Instagram (Bắt buộc)</label>
                    <input type="text" id="initIgId" placeholder="VD: @duc.hoang" onkeypress="if(event.key==='Enter') startSystem()">
                </div>
                <button class="btn-login" onclick="startSystem()">BẮT ĐẦU TRÒ CHUYỆN</button>
            </div>
        </div>

        <div class="chat-ui-wrapper" id="chatUiWrapper">
            <div class="chat-header">
                <div class="header-left">
                    <h1>MindGuard AI</h1>
                    <div class="status-dot"><i class="fa-solid fa-circle"></i> Đang hoạt động</div>
                </div>
                <div class="header-actions">
                    <button class="btn-action active" id="btnVoice" onclick="toggleVoice()" title="Bật/Tắt Giọng Nói">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                </div>
            </div>

            <div class="chat-messages" id="chatContainer"></div>

            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off" onkeypress="if(event.key==='Enter') sendTextMessage()">
                <button onclick="sendTextMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const loginScreen = document.getElementById('loginScreen');
        const chatUiWrapper = document.getElementById('chatUiWrapper');
        const chatContainer = document.getElementById('chatContainer');
        const btnVoice = document.getElementById('btnVoice');
        
        let userInfo = { name: "", igId: "", avatar: "https://www.w3schools.com/howto/img_avatar.png" };
        let isVoiceEnabled = true; // Biến điều khiển âm thanh

        // 1. Khởi động và Đăng nhập
        function startSystem() {
            const nameInput = document.getElementById('initName').value.trim();
            const igInput = document.getElementById('initIgId').value.trim();
            if (!nameInput || !igInput) { alert("Vui lòng nhập đầy đủ thông tin!"); return; }

            userInfo.name = nameInput;
            userInfo.igId = igInput;

            loginScreen.style.display = 'none';
            chatUiWrapper.style.display = 'flex';

            appendMessage(`Xin chào **${userInfo.name}**! Mình đang lắng nghe bạn đây. Hôm nay bạn cảm thấy thế nào?`, 'bot');
        }

        // 2. Bật / Tắt Giọng nói (Web Speech API)
        function toggleVoice() {
            isVoiceEnabled = !isVoiceEnabled;
            if (isVoiceEnabled) {
                btnVoice.classList.add('active');
                btnVoice.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            } else {
                btnVoice.classList.remove('active');
                btnVoice.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                window.speechSynthesis.cancel(); // Tắt âm đang đọc nếu có
            }
        }

        function speakBotMessage(text) {
            if (!isVoiceEnabled || !('speechSynthesis' in window)) return;
            const cleanText = text.replace(/[*#_]/g, ''); // Bỏ ký tự đặc biệt
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'vi-VN';
            utterance.rate = 1.0; 
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        // 3. UI Helpers
        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            let avatarHtml = sender === 'bot' 
                ? `<div class="avatar"><i class="fa-solid fa-robot"></i></div>` 
                : `<div class="avatar"><i class="fa-solid fa-user"></i></div>`;
            
            let nameHtml = sender === 'bot' 
                ? `<span class="sender-name">MindGuard</span>` 
                : `<span class="sender-name">${userInfo.name}</span>`;

            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

            msgDiv.innerHTML = `
                ${avatarHtml}
                <div class="message-info">
                    ${nameHtml}
                    <div class="message-content">${formattedText}</div>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();

            // Nếu là bot trả lời, tự động đọc văn bản
            if (sender === 'bot') {
                speakBotMessage(text);
            }
        }

        function appendLoadingBot() {
            const loadDiv = document.createElement('div');
            loadDiv.className = 'message bot'; loadDiv.id = 'botLoadingTemp';
            loadDiv.innerHTML = `<div class="avatar"><i class="fa-solid fa-robot"></i></div>
                                 <div class="message-info"><span class="sender-name">MindGuard</span>
                                 <div class="message-content">Đang suy nghĩ... <i class="fa-solid fa-spinner fa-spin"></i></div></div>`;
            chatContainer.appendChild(loadDiv);
            scrollToBottom();
        }
        function removeLoadingBot() { const loadDiv = document.getElementById('botLoadingTemp'); if (loadDiv) loadDiv.remove(); }

        // 4. Gửi dữ liệu thật tới Python Backend
        async function sendTextMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            input.value = '';
            appendLoadingBot();

            try {
                // Gọi API backend (Flask) của bạn
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message, 
                        user_name: userInfo.name,
                        ig_id: userInfo.igId 
                    })
                });
                
                const data = await response.json();
                removeLoadingBot();
                appendMessage(data.reply, 'bot');

            } catch (err) {
                removeLoadingBot();
                appendMessage("❌ Máy chủ đang bận hoặc không phản hồi. Vui lòng thử lại sau.", 'bot');
            }
        }
    </script>
</body>
</html>
