<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindGuard AI — Trợ lý Tâm lý</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #3b82f6, #6366f1);
            --bg-body: #070b14;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-panel: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --safe-color: #10b981;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e1b4b, #070b14 60%);
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }

        /* KHUNG CONTAINER CHÍNH */
        .app-container {
            display: flex; flex-direction: column; 
            width: 100%; max-width: 1200px; /* Tăng max-width để chứa sidebar */
            height: 90vh;
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: 24px; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); 
            border: 1px solid var(--glass-border); position: relative;
        }

        /* MÀN HÌNH ĐĂNG NHẬP */
        .login-screen { 
            position: absolute; inset: 0; 
            background: radial-gradient(circle at center, rgba(15,23,42,0.9), #070b14); 
            z-index: 100; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 20px; 
            transition: opacity 0.4s ease;
        }
        
        .login-box { 
            background: var(--glass-panel); backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 20px; width: 100%; max-width: 420px; 
            border: 1px solid var(--glass-border); text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: floatUp 0.6s ease-out;
        }
        @keyframes floatUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .login-box h2 { font-size: 24px; margin-bottom: 15px; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; line-height: 1.6; }
        
        .login-group { margin-bottom: 20px; text-align: left; }
        .login-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500;}
        .login-group input { 
            width: 100%; background: rgba(0,0,0,0.2); 
            border: 1px solid var(--glass-border); border-radius: 12px; 
            padding: 14px; color: var(--text-main); font-size: 15px; outline: none; transition: all 0.3s ease;
        }
        .login-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        
        .btn-login { 
            width: 100%; background: var(--primary-gradient); color: white; 
            border: none; padding: 16px; border-radius: 12px; font-weight: 600; 
            cursor: pointer; margin-top: 10px; font-size: 15px; transition: transform 0.2s, box-shadow 0.2s; 
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        /* BỐ CỤC CHAT (SIDEBAR + MAIN) */
        .chat-ui-wrapper { display: none; flex-direction: row; height: 100%; width: 100%; }
        
        /* SIDEBAR (BẢNG ĐIỀU KHIỂN BÊN TRÁI) */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(10, 15, 30, 0.5);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            transition: transform 0.3s ease;
        }

        .user-profile {
            padding: 30px 20px 20px; border-bottom: 1px solid var(--glass-border);
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        .avatar-container {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--glass-panel); border: 2px solid var(--glass-border);
            margin-bottom: 15px; position: relative;
            display: flex; justify-content: center; align-items: center;
            font-size: 32px; color: var(--text-muted); cursor: pointer;
            overflow: hidden;
        }
        
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .avatar-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.2s; font-size: 20px; color: white;
        }
        .avatar-container:hover .avatar-overlay { opacity: 1; }

        .user-profile h3 { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
        .user-profile p { font-size: 13px; color: var(--text-muted); background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 20px;}

        .chat-history { flex: 1; padding: 20px 10px; overflow-y: auto; }
        .chat-history h4 { font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; padding-left: 10px; letter-spacing: 0.5px; }
        .history-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
        .history-list li {
            padding: 12px 15px; border-radius: 10px;
            display: flex; align-items: center; gap: 10px;
            font-size: 14px; color: var(--text-main); cursor: pointer;
            transition: background 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .history-list li:hover { background: var(--glass-panel); }
        .history-list li.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }

        /* KHU VỰC MAIN CHAT */
        .chat-main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; position: relative; }

        .chat-header { 
            padding: 20px; background: rgba(15, 23, 42, 0.4); 
            border-bottom: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: space-between; 
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        .header-left h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.5px;}
        .status-dot { font-size: 12px; color: var(--safe-color); display: flex; align-items: center; gap: 6px; }
        
        .chat-messages { 
            flex: 1; padding: 24px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth;
        }
        
        /* Tùy chỉnh thanh cuộn */
        .chat-messages::-webkit-scrollbar, .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb, .chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .message { display: flex; gap: 14px; max-width: 85%; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        
        .avatar { 
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .bot .avatar { background: var(--primary-gradient); color: white; }
        .user .avatar { background: var(--glass-panel); border: 1px solid var(--glass-border); color: var(--text-muted); }
        
        .message-info { display: flex; flex-direction: column; gap: 6px; max-width: 100%; }
        .sender-name { font-size: 13px; color: var(--text-muted); margin-bottom: 2px; }
        .user .sender-name { text-align: right; }
        
        .message-content { 
            padding: 14px 18px; border-radius: 18px; font-size: 15px; 
            line-height: 1.6; word-break: break-word; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .bot .message-content { background: var(--glass-panel); border: 1px solid var(--glass-border); border-top-left-radius: 4px; }
        .user .message-content { background: var(--primary-gradient); color: #ffffff; border-top-right-radius: 4px; }
        
        .btn-play-voice {
            background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.4);
            color: #60a5fa; padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
            cursor: pointer; margin-top: 10px; display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.3s ease; align-self: flex-start;
        }
        .btn-play-voice:hover { background: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-play-voice.playing { background: var(--primary-gradient); color: white; border: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); animation: pulsePlay 1.5s infinite; }
        @keyframes pulsePlay { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.7); } 70% { box-shadow: 0 0 0 10px rgba(59,130,246,0); } 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); } }

        .chat-input-area { 
            padding: 20px; background: rgba(15, 23, 42, 0.5); border-top: 1px solid var(--glass-border); 
            display: flex; gap: 12px; align-items: center; 
        }
        .chat-input-area input { 
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            border-radius: 24px; padding: 15px 24px; color: var(--text-main); 
            font-size: 15px; outline: none; transition: all 0.3s ease;
        }
        .chat-input-area input:focus { background: rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.2); }
        .chat-input-area button { 
            background: var(--primary-gradient); border: none; color: white; 
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 18px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .chat-input-area button:hover { transform: scale(1.05); }

        /* THIẾT KẾ ĐÁP ỨNG CHO ĐIỆN THOẠI (MOBILE) */
        .sidebar-overlay {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 40;
        }
        @media (max-width: 768px) {
            body { padding: 0; background: #070b14; }
            .app-container { height: 100dvh; max-width: 100%; border-radius: 0; border: none; }
            .login-box { border-radius: 0; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 20px;}
            
            /* Xử lý Sidebar trên Mobile */
            .sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 50; background: var(--bg-body); transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .menu-toggle { display: block; }
            
            .message { max-width: 95%; }
            .chat-messages { padding: 16px; gap: 16px; }
            .message-content { font-size: 14px; padding: 12px 16px; }
            .chat-input-area { padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
            .chat-input-area input { padding: 12px 18px; font-size: 14px; }
            .chat-input-area button { width: 44px; height: 44px; font-size: 16px; }
            .avatar { width: 34px; height: 34px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <div class="login-screen" id="loginScreen">
            <div class="login-box">
                <h2><i class="fa-solid fa-shield-halved"></i> MindGuard</h2>
                <p>Không gian an toàn để bạn chia sẻ mọi suy nghĩ. Vui lòng nhập thông tin để kết nối.</p>
                <div class="login-group">
                    <label>Tên gọi của bạn</label>
                    <input type="text" id="initName" placeholder="Ví dụ: Hoàng Đức" onkeypress="if(event.key==='Enter') startSystem()">
                </div>
                <div class="login-group">
                    <label>Mã Token ID (Dạng số)</label>
                    <input type="number" id="initTokenId" placeholder="Ví dụ: 7498394" onkeypress="if(event.key==='Enter') startSystem()">
                </div>
                <button class="btn-login" onclick="startSystem()">BẮT ĐẦU TRÒ CHUYỆN</button>
            </div>
        </div>

        <div class="chat-ui-wrapper" id="chatUiWrapper">
            
            <div class="sidebar" id="sidebar">
                <div class="user-profile">
                    <label for="avatarUpload" class="avatar-container">
                        <i class="fa-solid fa-user" id="defaultAvatarIcon"></i>
                        <img id="sidebarAvatarImg" src="" alt="Avatar">
                        <div class="avatar-overlay"><i class="fa-solid fa-camera"></i></div>
                    </label>
                    <input type="file" id="avatarUpload" accept="image/*" hidden>
                    
                    <h3 id="sidebarUserName">User Name</h3>
                    <p id="sidebarTokenId">Token: XXXXX</p>
                </div>
                <div class="chat-history">
                    <h4>Lịch sử</h4>
                    <ul class="history-list" id="historyList">
                        <li class="active"><i class="fa-regular fa-message"></i> Phiên trò chuyện hiện tại</li>
                        <li><i class="fa-regular fa-message"></i> Suy nghĩ ngày hôm qua</li>
                        <li><i class="fa-regular fa-message"></i> Áp lực công việc</li>
                    </ul>
                </div>
            </div>

            <div class="chat-main">
                <div class="chat-header">
                    <div class="header-left">
                        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                        <div>
                            <h1>MindGuard AI</h1>
                            <div class="status-dot"><i class="fa-solid fa-circle"></i> Trực tuyến</div>
                        </div>
                    </div>
                </div>

                <div class="chat-messages" id="chatContainer"></div>

                <div class="chat-input-area">
                    <input type="text" id="userInput" placeholder="Nhắn tin cho MindGuard..." autocomplete="off" onkeypress="if(event.key==='Enter') sendTextMessage()">
                    <button onclick="sendTextMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginScreen = document.getElementById('loginScreen');
        const chatUiWrapper = document.getElementById('chatUiWrapper');
        const chatContainer = document.getElementById('chatContainer');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        
        let userInfo = { name: "", tokenId: "", avatarDataUrl: null };

        // 1. Xử lý Toggle Sidebar (Mobile)
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        }

        // 2. Xử lý tải lên Avatar
        document.getElementById('avatarUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    userInfo.avatarDataUrl = event.target.result;
                    // Cập nhật ở Sidebar
                    document.getElementById('sidebarAvatarImg').src = userInfo.avatarDataUrl;
                    document.getElementById('sidebarAvatarImg').style.display = 'block';
                    document.getElementById('defaultAvatarIcon').style.display = 'none';
                    
                    // Cập nhật tất cả các avatar trong đoạn chat hiện tại
                    document.querySelectorAll('.message.user .avatar').forEach(av => {
                        av.innerHTML = `<img src="${userInfo.avatarDataUrl}" alt="Avatar">`;
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        // 3. Khởi động và Đăng nhập
        function startSystem() {
            const nameInput = document.getElementById('initName').value.trim();
            const tokenInput = document.getElementById('initTokenId').value.trim();
            if (!nameInput || !tokenInput) { alert("Vui lòng nhập đầy đủ thông tin để tiếp tục nhé!"); return; }

            userInfo.name = nameInput;
            userInfo.tokenId = tokenInput;

            // Cập nhật thông tin vào Sidebar
            document.getElementById('sidebarUserName').innerText = userInfo.name;
            document.getElementById('sidebarTokenId').innerText = `Token: ${userInfo.tokenId}`;

            // Hiệu ứng mờ dần màn hình login
            loginScreen.style.opacity = '0';
            setTimeout(() => {
                loginScreen.style.display = 'none';
                chatUiWrapper.style.display = 'flex';
                appendMessage(`Xin chào **${userInfo.name}**! Mình đang ở đây và sẵn sàng lắng nghe bạn. Hôm nay bạn cảm thấy thế nào?`, 'bot');
            }, 300);
        }

        // 4. Chức năng Đọc tin nhắn (Phát từng tin)
        function playVoiceMessage(textId, btnElement) {
            if (!('speechSynthesis' in window)) {
                alert("Rất tiếc, trình duyệt của bạn không hỗ trợ chức năng đọc giọng nói.");
                return;
            }

            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                document.querySelectorAll('.btn-play-voice').forEach(b => {
                    b.innerHTML = '<i class="fa-solid fa-play"></i> Nghe tin nhắn';
                    b.classList.remove('playing');
                });
                if (btnElement.classList.contains('playing')) return;
            }

            const rawText = document.getElementById(textId).innerText;
            const cleanText = rawText.replace(/[*#_]/g, ''); 
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'vi-VN';
            utterance.rate = 1.0; 

            btnElement.innerHTML = '<i class="fa-solid fa-stop"></i> Đang phát...';
            btnElement.classList.add('playing');

            utterance.onend = function() {
                btnElement.innerHTML = '<i class="fa-solid fa-play"></i> Nghe tin nhắn';
                btnElement.classList.remove('playing');
            };

            window.speechSynthesis.speak(utterance);
        }

        // 5. Hiển thị tin nhắn
        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            const textId = 'msg-text-' + Date.now() + Math.floor(Math.random() * 100);

            // Kiểm tra avatar: Nếu là User và có ảnh thì dùng thẻ img, nếu không dùng icon
            let userAvatarContent = userInfo.avatarDataUrl 
                ? `<img src="${userInfo.avatarDataUrl}" alt="Avatar">` 
                : `<i class="fa-solid fa-user"></i>`;

            let avatarHtml = sender === 'bot' 
                ? `<div class="avatar"><i class="fa-solid fa-leaf"></i></div>` 
                : `<div class="avatar">${userAvatarContent}</div>`;
            
            let nameHtml = sender === 'bot' 
                ? `<span class="sender-name">MindGuard</span>` 
                : `<span class="sender-name">Bạn</span>`;

            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

            let contentHtml = `<div class="message-content">
                                   <div id="${textId}">${formattedText}</div>`;
            
            if (sender === 'bot') {
                contentHtml += `<button class="btn-play-voice" onclick="playVoiceMessage('${textId}', this)">
                                    <i class="fa-solid fa-play"></i> Nghe tin nhắn
                                </button>`;
            }
            contentHtml += `</div>`;

            msgDiv.innerHTML = `
                ${avatarHtml}
                <div class="message-info">
                    ${nameHtml}
                    ${contentHtml}
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function appendLoadingBot() {
            const loadDiv = document.createElement('div');
            loadDiv.className = 'message bot'; loadDiv.id = 'botLoadingTemp';
            loadDiv.innerHTML = `<div class="avatar"><i class="fa-solid fa-leaf"></i></div>
                                 <div class="message-info"><span class="sender-name">MindGuard</span>
                                 <div class="message-content" style="display: flex; gap: 8px; align-items: center;">
                                    Đang suy nghĩ... <i class="fa-solid fa-spinner fa-spin"></i>
                                 </div></div>`;
            chatContainer.appendChild(loadDiv);
            scrollToBottom();
        }
        function removeLoadingBot() { const loadDiv = document.getElementById('botLoadingTemp'); if (loadDiv) loadDiv.remove(); }

        // 6. Gửi dữ liệu tới Python Backend
        async function sendTextMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            input.value = '';
            appendLoadingBot();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message, 
                        user_name: userInfo.name,
                        token_id: userInfo.tokenId
                    })
                });
                
                const data = await response.json();
                removeLoadingBot();
                appendMessage(data.reply, 'bot');

            } catch (err) {
                removeLoadingBot();
                appendMessage("❌ Máy chủ đang bận hoặc không phản hồi. Xin lưu ý đây là giao diện Demo chưa kết nối Backend Python thực tế.", 'bot');
            }
        }
    </script>
</body>
</html>
