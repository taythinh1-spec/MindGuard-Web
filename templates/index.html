<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGuard AI — Trợ lý Tâm lý Học đường</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131c2e;
            --bg-chat-bot: #1e293b;
            --bg-chat-user: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --safe-color: #10b981;
            --danger-color: #ef4444;
            --border-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* Khung container tổng - Chuyển thành giao diện 1 cột trung tâm */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
        }

        /* HEADER */
        .chat-header {
            padding: 16px 20px;
            background-color: rgba(19, 28, 46, 0.95);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header-left h1 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .status-dot {
            font-size: 12px;
            color: var(--safe-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-settings {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-settings:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
            background-color: var(--bg-chat-bot);
        }

        /* KHU VỰC TIN NHẮN */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: #0b1120;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            object-fit: cover;
            border: 2px solid transparent;
        }

        .bot .avatar {
            background-color: var(--accent-color);
            color: white;
        }

        .user .avatar {
            border-color: var(--accent-color);
        }

        .message-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sender-name {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .user .sender-name {
            text-align: right;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .bot .message-content {
            background-color: var(--bg-chat-bot);
            border-top-left-radius: 2px;
        }

        .user .message-content {
            background-color: var(--bg-chat-user);
            color: #ffffff;
            border-top-right-radius: 2px;
        }

        /* KHUNG NHẬP TIN NHẮN */
        .chat-input-area {
            padding: 16px 20px;
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #0b1120;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: var(--accent-color);
        }

        .chat-input-area button {
            background-color: var(--accent-color);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-size: 16px;
        }

        .chat-input-area button:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        /* MODAL CÀI ĐẶT */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background-color: #0b1120;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-primary);
            outline: none;
        }

        .btn-save {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="chat-header">
            <div class="header-left">
                <h1>MindGuard AI — Trợ lý Tâm lý</h1>
                <div class="status-dot">
                    <i class="fa-solid fa-circle"></i> Hệ thống sẵn sàng
                </div>
            </div>
            <button class="btn-settings" onclick="openModal()">
                <i class="fa-solid fa-gear"></i> Tùy chỉnh
            </button>
        </div>

        <div class="chat-messages" id="chatContainer">
            <div class="message bot">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-info">
                    <span class="sender-name">MindGuard</span>
                    <div class="message-content">
                        Xin chào! Mình là MindGuard — trợ lý tâm lý học đường của bạn. Bạn muốn tâm sự hay chia sẻ điều gì với mình hôm nay không? 💙
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button onclick="sendTextMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="modal-title">
                Cài đặt cá nhân
                <button class="close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="form-group">
                <label>Tên hiển thị</label>
                <input type="text" id="inputName" placeholder="VD: Học sinh">
            </div>
            <div class="form-group">
                <label>Đường dẫn ảnh đại diện (URL)</label>
                <input type="text" id="inputAvatar" placeholder="https://...">
            </div>
            <button class="btn-save" onclick="saveSettings()">Lưu thay đổi</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const modal = document.getElementById('settingsModal');
        
        // Thông tin người dùng mặc định
        let userInfo = {
            name: "Học sinh",
            avatar: "https://www.w3schools.com/howto/img_avatar.png"
        };

        // Tự động cuộn xuống cuối màn hình chat
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Xử lý phím Enter
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendTextMessage();
        }

        // Quản lý Modal
        function openModal() {
            document.getElementById('inputName').value = userInfo.name;
            document.getElementById('inputAvatar').value = userInfo.avatar;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function saveSettings() {
            const newName = document.getElementById('inputName').value.trim();
            const newAvatar = document.getElementById('inputAvatar').value.trim();
            
            if (newName) userInfo.name = newName;
            if (newAvatar) userInfo.avatar = newAvatar;
            
            closeModal();
            // Tùy chọn: Thêm thông báo hệ thống đã đổi thông tin thành công
            appendMessage("Hệ thống: Đã cập nhật thông tin thành công!", 'bot', true);
        }

        // Hàm chèn tin nhắn vào giao diện
        function appendMessage(text, sender, isSystem = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            let avatarHtml = '';
            let nameHtml = '';

            if (sender === 'bot') {
                avatarHtml = `<div class="avatar"><i class="fa-solid fa-robot"></i></div>`;
                nameHtml = `<span class="sender-name">MindGuard</span>`;
            } else {
                // Nếu URL ảnh lỗi, thay bằng icon người dùng mặc định (onerror)
                avatarHtml = `<img src="${userInfo.avatar}" class="avatar" onerror="this.outerHTML='<div class=\\'avatar\\'><i class=\\'fa-solid fa-user\\'></i></div>'">`;
                nameHtml = `<span class="sender-name">${userInfo.name}</span>`;
            }

            msgDiv.innerHTML = `
                ${avatarHtml}
                <div class="message-info">
                    ${!isSystem ? nameHtml : ''}
                    <div class="message-content" style="${isSystem ? 'background: transparent; color: var(--safe-color); box-shadow: none; padding: 0; font-style: italic;' : ''}">
                        ${text}
                    </div>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function appendLoadingBot() {
            const loadDiv = document.createElement('div');
            loadDiv.className = 'message bot';
            loadDiv.id = 'botLoadingTemp';
            loadDiv.innerHTML = `
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-info">
                    <span class="sender-name">MindGuard</span>
                    <div class="message-content">Đang nhập... <i class="fa-solid fa-spinner fa-spin"></i></div>
                </div>
            `;
            chatContainer.appendChild(loadDiv);
            scrollToBottom();
        }

        function removeLoadingBot() {
            const loadDiv = document.getElementById('botLoadingTemp');
            if (loadDiv) loadDiv.remove();
        }

        // Gửi tin nhắn
        async function sendTextMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            // Hiển thị tin nhắn của User
            appendMessage(message, 'user');
            input.value = '';

            // Hiển thị trạng thái bot đang gõ
            appendLoadingBot();

            /* ==========================================
               GẮN API BACKEND CỦA BẠN VÀO ĐÂY
               ========================================== */
            try {
                // MÔ PHỎNG API CHỜ 1.5 GIÂY (Xóa phần này khi dùng API thật)
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Mã gọi API thực tế (Đang bị comment lại)
                /*
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, student_code: "HS001", student_name: userInfo.name })
                });
                const data = await response.json();
                removeLoadingBot();
                appendMessage(data.reply, 'bot');
                */

                // Trả lời mô phỏng
                removeLoadingBot();
                appendMessage("Mình đang lắng nghe bạn đây. Bạn cứ chia sẻ tiếp nhé!", 'bot');

            } catch (err) {
                removeLoadingBot();
                appendMessage("❌ Lỗi kết nối đến máy chủ. Vui lòng thử lại sau.", 'bot');
            }
        }
    </script>
</body>
</html>
